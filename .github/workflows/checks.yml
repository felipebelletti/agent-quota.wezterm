name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua parser
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Check Python helper syntax
        run: python3 -m py_compile codex-limits.py

      - name: Check Lua plugin syntax
        run: luac5.4 -p plugin/init.lua

      - name: Check whitespace
        run: git diff-tree --check --root --no-commit-id -r HEAD
